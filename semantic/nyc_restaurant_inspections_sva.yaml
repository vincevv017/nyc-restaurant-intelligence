      - name: IS_CRITICAL_VIOLATION
        description: Indicates whether the violation is classified as critical.
        expr: IS_CRITICAL_VIOLATION
        data_type: BOOLEAN
        sample_values:
          - 'TRUE'
          - 'FALSE'
      - name: RESTAURANT_ID
        description: Unique identifier for the restaurant associated with the violation.
