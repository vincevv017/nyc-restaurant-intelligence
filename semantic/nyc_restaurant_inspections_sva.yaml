name: NYC_RESTAURANT_INSPECTION_SVA
description: |-
  NYC Department of Health (DOHMH) restaurant inspection analytics across all
  five boroughs. Covers inspection outcomes, violation citations, restaurant
  profiles, and enforcement actions. Inspection scores are penalty-based:
  higher score means more violations and a worse outcome. Grade A (0-13 points)
  means the restaurant passes. Grade B (14-27) indicates significant violations
  and triggers a re-inspection. Grade C (28+ points) means the restaurant fails.
  Data is refreshed daily from NYC Open Data via the Socrata API.
tables:
  - name: FCT_INSPECTIONS
    description: The table contains records of restaurant health inspections. Each record represents a single inspection event and includes details about the inspection type, outcome, grading information, and violation counts categorized by severity level.
    base_table:
      database: RESTAURANT_INTELLIGENCE
      schema: MARTS
      table: FCT_INSPECTIONS
    dimensions:
      - name: ACTION
        description: The action taken by the health department as a result of the inspection.
        expr: ACTION
        data_type: VARCHAR
        sample_values:
          - No violations were recorded at the time of this inspection.
          - Violations were cited in the following area(s).
          - Establishment re-opened by DOHMH.
      - name: CRITICAL_VIOLATIONS
        description: The number of critical violations found during the restaurant inspection.
        expr: CRITICAL_VIOLATIONS
        data_type: NUMBER
        sample_values:
          - '1'
          - '2'
          - '0'
      - name: DIM_RESTAURANT_KEY
        description: Surrogate key linking to the restaurant dimension table.
        expr: DIM_RESTAURANT_KEY
        data_type: VARCHAR
        sample_values:
          - 739a35dfab589124ec684c1cd0844b51
          - 74693f9cfd13f582cd918ae1a642fbaa
          - 4604fa8784ccf11b35a3853609deeea7
      - name: GRADE
        description: The letter grade assigned to the restaurant following a health inspection.
        expr: GRADE
        data_type: VARCHAR
        sample_values:
          - A
          - B
          - 'N'
      - name: GRADE_SORT_ORDER
        description: The sort order for inspection grades used for ranking or ordering purposes.
        expr: GRADE_SORT_ORDER
        data_type: NUMBER
        sample_values:
          - '3'
          - '2'
      - name: HAS_CRITICAL_VIOLATION
        description: Indicates whether the inspection identified any critical violations.
        expr: HAS_CRITICAL_VIOLATION
        data_type: BOOLEAN
        sample_values:
          - 'TRUE'
          - 'FALSE'
      - name: INSPECTION_DATE_KEY
        description: The date key representing when the restaurant inspection occurred.
        expr: INSPECTION_DATE_KEY
        data_type: NUMBER
        sample_values:
          - '20230131'
          - '20230713'
          - '20211001'
      - name: INSPECTION_SCORE
        description: The numerical score assigned to a restaurant during a health or safety inspection.
        expr: INSPECTION_SCORE
        data_type: NUMBER
        sample_values:
          - '60'
          - '2'
          - '52'
      - name: INSPECTION_TYPE
        description: The type of inspection conducted and whether it was an initial inspection or a re-inspection.
        expr: INSPECTION_TYPE
        data_type: VARCHAR
        sample_values:
          - Administrative Miscellaneous / Re-inspection
          - Administrative Miscellaneous / Initial Inspection
          - Cycle Inspection / Initial Inspection
      - name: NON_CRITICAL_VIOLATIONS
        description: The number of non-critical violations found during the restaurant inspection.
        expr: NON_CRITICAL_VIOLATIONS
        data_type: NUMBER
        sample_values:
          - '0'
          - '1'
          - '2'
      - name: PASSED_WITH_GRADE_A
        description: Indicates whether the inspection was passed with a grade A.
        expr: PASSED_WITH_GRADE_A
        data_type: BOOLEAN
        sample_values:
          - 'FALSE'
          - 'TRUE'
      - name: RESTAURANT_ID
        description: Unique identifier for each restaurant in the inspection records.
        expr: RESTAURANT_ID
        data_type: VARCHAR
        sample_values:
          - '50159638'
          - '40388269'
          - '41489741'
      - name: TOTAL_VIOLATIONS
        description: The total number of violations found during the inspection.
        expr: TOTAL_VIOLATIONS
        data_type: NUMBER
        sample_values:
          - '1'
          - '5'
          - '3'
    time_dimensions:
      - name: GRADE_DATE
        description: The date when the inspection grade was assigned to the restaurant.
        expr: GRADE_DATE
        data_type: DATE
        sample_values:
          - '2025-12-30'
          - '2025-08-04'
          - '2023-12-01'
      - name: INSPECTION_DATE
        description: The date when the restaurant inspection was conducted.
        expr: INSPECTION_DATE
        data_type: DATE
        sample_values:
          - '2025-08-22'
          - '2022-09-14'
          - '2022-02-14'
  - name: DIM_RESTAURANT
    description: The table contains records of restaurants with their identifying information and location details. Each record represents a single restaurant and includes geographic information such as borough and neighborhood, contact information, and cuisine type.
    base_table:
      database: RESTAURANT_INTELLIGENCE
      schema: MARTS
      table: DIM_RESTAURANT
    dimensions:
      - name: BOROUGH
        description: The borough where the restaurant is located.
        expr: BOROUGH
        data_type: VARCHAR
        sample_values:
          - Manhattan
          - Queens
          - Brooklyn
      - name: BUILDING_NUMBER
        description: The building number portion of the restaurant's physical address.
        expr: BUILDING_NUMBER
        data_type: VARCHAR
        sample_values:
          - '185'
          - 31-06
          - '85'
      - name: CUISINE_DESCRIPTION
        description: The type of cuisine served by the restaurant.
        expr: CUISINE_DESCRIPTION
        data_type: VARCHAR
        sample_values:
          - Jewish/Kosher
          - French
      - name: DIM_RESTAURANT_KEY
        description: A unique identifier for each restaurant in the dimension table.
        expr: DIM_RESTAURANT_KEY
        data_type: VARCHAR
        sample_values:
          - 54df53c3380ed8ffc7196c2bab7cccce
