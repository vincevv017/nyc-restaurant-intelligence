        - DIM_VIOLATION_KEY
relationships:
  - name: FCT_INSPECTIONS_TO_DIM_DATE
    left_table: FCT_INSPECTIONS
    right_table: DIM_DATE
    join_type: inner
    relationship_type: many_to_one
    relationship_columns:
      - left_column: INSPECTION_DATE_KEY
        right_column: DATE_KEY
  - name: FCT_INSPECTIONS_TO_DIM_RESTAURANT
    left_table: FCT_INSPECTIONS
    right_table: DIM_RESTAURANT
    join_type: inner
    relationship_type: many_to_one
    relationship_columns:
      - left_column: DIM_RESTAURANT_KEY
        right_column: DIM_RESTAURANT_KEY
  - name: FCT_VIOLATIONS_TO_DIM_DATE
    left_table: FCT_VIOLATIONS
    right_table: DIM_DATE
    join_type: inner
    relationship_type: many_to_one
    relationship_columns:
      - left_column: INSPECTION_DATE_KEY
        right_column: DATE_KEY
  - name: FCT_VIOLATIONS_TO_DIM_RESTAURANT
    left_table: FCT_VIOLATIONS
    right_table: DIM_RESTAURANT
    join_type: inner
    relationship_type: many_to_one
    relationship_columns:
      - left_column: DIM_RESTAURANT_KEY
        right_column: DIM_RESTAURANT_KEY
  - name: FCT_VIOLATIONS_TO_DIM_VIOLATION_TYPE
    left_table: FCT_VIOLATIONS
    right_table: DIM_VIOLATION_TYPE
    join_type: inner
    relationship_type: many_to_one
    relationship_columns:
      - left_column: DIM_VIOLATION_KEY
        right_column: DIM_VIOLATION_KEY
verified_queries:
  - name: 0;1
    question: How do restaurant inspection volumes and average scores vary by day of the week this year?
    sql: SELECT d.day_name_short AS day_name, d.day_of_week, COUNT(*) AS inspections, ROUND(AVG(i.inspection_score), 1) AS avg_score FROM fct_inspections AS i JOIN dim_date AS d ON i.inspection_date_key = d.date_key WHERE d.year_number = YEAR(CURRENT_DATE) GROUP BY d.day_name_short, d.day_of_week ORDER BY d.day_of_week
    verified_at: 1772905309
    verified_by: Semantic Model Generator
  - name: 1;1
    question: Which zip codes have the highest average critical violations per restaurant over the last 12 months?
    sql: SELECT r.zipcode, r.borough, COUNT(DISTINCT r.restaurant_id) AS restaurants, SUM(CASE WHEN v.is_critical_violation THEN v.violation_count ELSE 0 END) AS critical_citations, ROUND(critical_citations * 1.0 / NULLIF(restaurants, 0), 1) AS critical_per_restaurant FROM fct_violations AS v JOIN dim_restaurant AS r ON v.dim_restaurant_key = r.dim_restaurant_key JOIN dim_date AS d ON v.inspection_date_key = d.date_key WHERE d.calendar_date >= DATEADD(MONTH, -12, CURRENT_DATE) AND NOT r.zipcode IS NULL GROUP BY r.zipcode, r.borough HAVING restaurants >= 20 ORDER BY critical_per_restaurant DESC LIMIT 20
    verified_at: 1772905309
    verified_by: Semantic Model Generator
  - name: 2;1
    question: Which restaurants are repeat offenders that have been closed more than once?
    sql: SELECT r.restaurant_name, r.borough, r.cuisine_description AS cuisine_type, r.street_address, COUNT(*) AS closure_count FROM fct_inspections AS i JOIN dim_restaurant AS r ON i.dim_restaurant_key = r.dim_restaurant_key WHERE i.action ILIKE '%Establishment Closed%' GROUP BY r.restaurant_name, r.borough, r.cuisine_description, r.street_address HAVING closure_count > 1 ORDER BY closure_count DESC LIMIT 20
    verified_at: 1772905309
    verified_by: Semantic Model Generator
  - name: 3;1
    question: Which restaurants have the highest risk profiles based on their inspection scores this year?
    sql: SELECT r.restaurant_name, r.borough, r.cuisine_description AS cuisine_type, r.street_address, MAX(i.inspection_score) AS worst_score, ROUND(AVG(i.inspection_score), 0) AS avg_score, SUM(i.critical_violations) AS total_critical, COUNT(*) AS inspections_this_year FROM fct_inspections AS i JOIN dim_restaurant AS r ON i.dim_restaurant_key = r.dim_restaurant_key JOIN dim_date AS d ON i.inspection_date_key = d.date_key WHERE d.calendar_date >= DATE_TRUNC('YEAR', CURRENT_DATE) AND NOT i.inspection_score IS NULL GROUP BY r.restaurant_name, r.borough, r.cuisine_description, r.street_address HAVING inspections_this_year >= 2 ORDER BY avg_score DESC LIMIT 20
    verified_at: 1772905309
    verified_by: Semantic Model Generator
  - name: 4;1
    question: What is the re-inspection rate by borough for the current year?
    sql: SELECT r.borough, COUNT(*) AS total_inspections, SUM(CASE WHEN i.inspection_type ILIKE '%Re-Inspection%' THEN 1 ELSE 0 END) AS re_inspections, ROUND(re_inspections * 100.0 / total_inspections, 2) AS re_inspection_rate_pct FROM fct_inspections AS i JOIN dim_restaurant AS r ON i.dim_restaurant_key = r.dim_restaurant_key JOIN dim_date AS d ON i.inspection_date_key = d.date_key WHERE d.calendar_date >= DATE_TRUNC('YEAR', CURRENT_DATE) AND r.borough <> '0' GROUP BY r.borough ORDER BY re_inspection_rate_pct DESC
    verified_at: 1772905309
    verified_by: Semantic Model Generator
  - name: 5;1
    question: What is the closure rate by borough for NYC restaurants?
    sql: SELECT r.borough, COUNT(*) AS total_inspections, SUM(CASE WHEN i.action ILIKE '%Establishment Closed%' THEN 1 ELSE 0 END) AS closures, ROUND(closures * 100.0 / total_inspections, 2) AS closure_rate_pct FROM fct_inspections AS i JOIN dim_restaurant AS r ON i.dim_restaurant_key = r.dim_restaurant_key WHERE r.borough <> '0' GROUP BY r.borough ORDER BY closure_rate_pct DESC
    verified_at: 1772905309
    verified_by: Semantic Model Generator
  - name: 6;1
    question: What are the monthly inspection trends with average scores and Grade A pass rates over the past two years?
    sql: SELECT d.year_number, d.month_name, d.month_number, COUNT(*) AS inspections, ROUND(AVG(i.inspection_score), 1) AS avg_score, ROUND(AVG(CASE WHEN i.passed_with_grade_a THEN 100.0 ELSE 0.0 END), 1) AS grade_a_rate FROM fct_inspections AS i JOIN dim_date AS d ON i.inspection_date_key = d.date_key WHERE d.year_number >= YEAR(CURRENT_DATE) - 1 GROUP BY d.year_number, d.month_name, d.month_number ORDER BY d.year_number, d.month_number
    verified_at: 1772905309
    verified_by: Semantic Model Generator
  - name: 7;1
    question: Which cuisine types have the highest share of critical violations among NYC restaurants?
    sql: SELECT r.cuisine_description AS cuisine_type, SUM(CASE WHEN v.is_critical_violation THEN v.violation_count ELSE 0 END) AS critical_citations, SUM(v.violation_count) AS total_citations, ROUND(critical_citations * 100.0 / NULLIF(total_citations, 0), 1) AS critical_share_pct FROM fct_violations AS v JOIN dim_restaurant AS r ON v.dim_restaurant_key = r.dim_restaurant_key GROUP BY r.cuisine_description HAVING total_citations >= 100 ORDER BY critical_citations DESC LIMIT 15
    verified_at: 1772905309
    verified_by: Semantic Model Generator
  - name: 8;1
    question: What are the top 10 most frequently cited critical violations in NYC restaurant inspections?
    sql: SELECT vt.violation_code, vt.violation_description, vt.criticality_label, SUM(v.violation_count) AS citation_count FROM fct_violations AS v JOIN dim_violation_type AS vt ON v.dim_violation_key = vt.dim_violation_key WHERE v.is_critical_violation = TRUE GROUP BY vt.violation_code, vt.violation_description, vt.criticality_label ORDER BY citation_count DESC LIMIT 10
