          - QN53
          - BK90
          - MN09
      - name: PHONE
        description: Restaurant phone numbers.
        expr: PHONE
        data_type: VARCHAR
        sample_values:
          - '3475334673'
          - '3478429221'
          - '7182957272'
      - name: RESTAURANT_ID
        description: Unique identifier for each restaurant in the system.
        expr: RESTAURANT_ID
        data_type: VARCHAR
        sample_values:
          - '50135410'
          - '50181134'
          - '50176042'
      - name: RESTAURANT_NAME
        description: The name of the restaurant.
        expr: RESTAURANT_NAME
        data_type: VARCHAR
        sample_values:
          - RED POKE
          - POPBAR POPLAB
          - LA COCINITA MIA
      - name: STREET_ADDRESS
        description: The street address of the restaurant location.
        expr: STREET_ADDRESS
        data_type: VARCHAR
        sample_values:
