  - name: 9;1
    question: What is the Grade A pass rate by borough for restaurant inspections?
    sql: SELECT r.borough, ROUND(AVG(CASE WHEN i.passed_with_grade_a THEN 100.0 ELSE 0.0 END), 1) AS grade_a_pass_rate, COUNT(*) AS total_inspections FROM fct_inspections AS i JOIN dim_restaurant AS r ON i.dim_restaurant_key = r.dim_restaurant_key WHERE r.borough <> '0' GROUP BY r.borough ORDER BY grade_a_pass_rate DESC
