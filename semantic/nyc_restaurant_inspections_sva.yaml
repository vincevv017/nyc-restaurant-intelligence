          - 192 Union Avenue
          - 31-31 Steinway Street
      - name: STREET_NAME
        description: Street names where restaurants are located.
        expr: STREET_NAME
        data_type: VARCHAR
        sample_values:
          - Union Avenue
          - Greenwich Street
          - West   38 Street
      - name: ZIPCODE
        description: Postal ZIP codes for restaurant locations.
        expr: ZIPCODE
        data_type: VARCHAR
        sample_values:
          - '11375'
          - '10012'
          - '11420'
    facts:
      - name: LATITUDE
        description: The geographic latitude coordinate of the restaurant location.
        expr: LATITUDE
        data_type: NUMBER
        sample_values:
          - '40.7338402'
          - '40.6871376'
          - '40.8095204'
      - name: LONGITUDE
        description: The geographic longitude coordinate of the restaurant location.
        expr: LONGITUDE
        data_type: NUMBER
        sample_values:
          - '-73.8897410'
          - '-73.9775273'
          - '-73.9487084'
    primary_key:
      columns:
        - DIM_RESTAURANT_KEY
  - name: DIM_DATE
    description: The table contains records representing individual calendar dates with their associated temporal attributes. Each record includes hierarchical time period classifications and indicators for special date characteristics such as weekends and month boundaries.
    base_table:
      database: RESTAURANT_INTELLIGENCE
      schema: MARTS
      table: DIM_DATE
    dimensions:
      - name: DATE_KEY
        description: Date identifier in numeric format serving as the primary key for the date dimension table.
        expr: DATE_KEY
        data_type: NUMBER
        sample_values:
          - '20000102'
          - '20000607'
          - '20000528'
      - name: DAY_NAME_SHORT
        description: The abbreviated name of the day of the week.
        expr: DAY_NAME_SHORT
        data_type: VARCHAR
        sample_values:
          - Mon
          - Sat
          - Sun
      - name: DAY_OF_MONTH
        description: The day of the month as a numeric value.
        expr: DAY_OF_MONTH
        data_type: NUMBER
        sample_values:
          - '1'
          - '3'
          - '2'
      - name: DAY_OF_WEEK
        description: The day of the week represented as a numeric value.
        expr: DAY_OF_WEEK
        data_type: NUMBER
        sample_values:
          - '6'
          - '1'
          - '0'
      - name: DAY_OF_YEAR
        description: The sequential day number within a calendar year ranging from 1 to 366.
        expr: DAY_OF_YEAR
        data_type: NUMBER
        sample_values:
          - '127'
          - '1'
          - '146'
      - name: IS_MONTH_END
        description: Indicates whether the date falls on the last day of a month.
        expr: IS_MONTH_END
        data_type: BOOLEAN
        sample_values:
          - 'FALSE'
          - 'TRUE'
      - name: IS_MONTH_START
        description: Indicates whether the date represents the first day of a month.
        expr: IS_MONTH_START
        data_type: BOOLEAN
        sample_values:
          - 'FALSE'
          - 'TRUE'
      - name: IS_WEEKEND
        description: Indicates whether the date falls on a weekend.
        expr: IS_WEEKEND
        data_type: BOOLEAN
        sample_values:
          - 'FALSE'
          - 'TRUE'
      - name: MONTH_NAME
        description: The name of the month.
        expr: MONTH_NAME
        data_type: VARCHAR
        sample_values:
          - January
          - March
          - February
      - name: MONTH_NUMBER
        description: The numeric representation of the month in a calendar year.
        expr: MONTH_NUMBER
        data_type: NUMBER
        sample_values:
          - '3'
          - '2'
          - '1'
      - name: MONTH_SHORT
        description: The abbreviated three-letter name of the month.
        expr: MONTH_SHORT
        data_type: VARCHAR
        sample_values:
          - Jan
          - Mar
          - Feb
      - name: QUARTER_LABEL
        description: The quarter of the year designation.
        expr: QUARTER_LABEL
        data_type: VARCHAR
        sample_values:
          - Q3
          - Q2
          - Q1
      - name: QUARTER_NUMBER
        description: The quarter of the year represented as a number from 1 to 4.
        expr: QUARTER_NUMBER
        data_type: NUMBER
        sample_values:
          - '1'
          - '3'
          - '2'
      - name: WEEK_OF_YEAR
        description: The week number within the calendar year.
        expr: WEEK_OF_YEAR
        data_type: NUMBER
        sample_values:
          - '2'
          - '22'
          - '52'
      - name: YEAR_MONTH
        description: The year and month of the date.
        expr: YEAR_MONTH
        data_type: NUMBER
        sample_values:
          - '200001'
          - '202303'
          - '202502'
      - name: YEAR_NUMBER
        description: The calendar year as a four-digit number.
        expr: YEAR_NUMBER
        data_type: NUMBER
        sample_values:
          - '2002'
          - '2000'
          - '2001'
      - name: YEAR_QUARTER
        description: The year and quarter combination representing a specific three-month period within a calendar year.
        expr: YEAR_QUARTER
        data_type: NUMBER
        sample_values:
          - '200002'
          - '200003'
          - '202601'
    time_dimensions:
      - name: CALENDAR_DATE
        description: Calendar dates used for time-based analysis and reporting in the restaurant intelligence system.
        expr: CALENDAR_DATE
        data_type: DATE
        sample_values:
          - '2000-01-29'
          - '2000-02-02'
          - '2000-06-21'
    primary_key:
      columns:
        - DATE_KEY
  - name: FCT_VIOLATIONS
    description: The table contains records of restaurant health and safety violations identified during inspections. Each record represents a specific violation found at a restaurant, including details about the inspection timing and type, the nature of the violation, criticality status, and associated scores and actions taken.
    base_table:
      database: RESTAURANT_INTELLIGENCE
      schema: MARTS
      table: FCT_VIOLATIONS
    dimensions:
      - name: ACTION
        description: The regulatory action taken by the health department in response to identified violations.
        expr: ACTION
        data_type: VARCHAR
        sample_values:
          - No violations were recorded at the time of this inspection.
          - Establishment re-opened by DOHMH.
          - Violations were cited in the following area(s).
      - name: DIM_RESTAURANT_KEY
        description: Surrogate key linking to the restaurant dimension table.
        expr: DIM_RESTAURANT_KEY
        data_type: VARCHAR
        sample_values:
          - 25da7acddc62f119be29c87650b55c6a
          - 7e905d1929e0dfb23ca66c1cde8dcf03
          - 87167c1feb647ca8cae3e2e9d35c15f0
      - name: DIM_VIOLATION_KEY
        description: Unique identifier for each violation record in the dimension table.
        expr: DIM_VIOLATION_KEY
        data_type: VARCHAR
        sample_values:
          - 747bff46022a44dda38acf59ed6ea815
          - 3ad39daa2a986b0186d55490dd48e47b
          - 45de708fcb693a3ccaecbaf8c526ab02
      - name: INSPECTION_DATE_KEY
        description: The date key representing when the inspection occurred.
        expr: INSPECTION_DATE_KEY
        data_type: NUMBER
        sample_values:
          - '20240509'
          - '20250201'
          - '20220126'
      - name: INSPECTION_SCORE
        description: The numerical score assigned to a restaurant during a health inspection.
        expr: INSPECTION_SCORE
        data_type: NUMBER
        sample_values:
          - '50'
          - '38'
          - '11'
      - name: INSPECTION_TYPE
        description: The type of inspection conducted at the restaurant establishment.
