        data_type: NUMBER
        sample_values:
          - '1'
    time_dimensions:
      - name: INSPECTION_DATE
        description: The date when the restaurant inspection was conducted.
        expr: INSPECTION_DATE
        data_type: DATE
        sample_values:
          - '2024-06-05'
          - '2020-02-28'
          - '2022-07-21'
  - name: DIM_VIOLATION_TYPE
    description: The table contains records of violation types used for classification and reference purposes. Each record represents a distinct violation category with descriptive information and criticality indicators.
    base_table:
      database: RESTAURANT_INTELLIGENCE
      schema: MARTS
      table: DIM_VIOLATION_TYPE
    dimensions:
      - name: CRITICALITY_LABEL
        description: The criticality level classification of a violation type.
        expr: CRITICALITY_LABEL
        data_type: VARCHAR
        sample_values:
          - Not Applicable
          - Critical
          - Not Critical
      - name: DIM_VIOLATION_KEY
        description: Unique identifier for each violation type dimension record.
        expr: DIM_VIOLATION_KEY
        data_type: VARCHAR
        sample_values:
          - bef707f4fed5e51cdc80f8d1e54b2a8f
          - cfa58d744de96c47e982212d5769c70b
          - f17559535b6cab5dccbebc0403d0b2fd
      - name: IS_CRITICAL_VIOLATION
        description: Indicates whether the violation type is classified as critical.
        expr: IS_CRITICAL_VIOLATION
        data_type: BOOLEAN
        sample_values:
          - 'TRUE'
          - 'FALSE'
      - name: VIOLATION_CODE
        description: Codes identifying specific types of health or safety violations found during restaurant inspections.
        expr: VIOLATION_CODE
        data_type: VARCHAR
        sample_values:
          - 04I
          - 10A
          - 03I
      - name: VIOLATION_DESCRIPTION
        description: Descriptions of health code violations found during restaurant inspections.
        expr: VIOLATION_DESCRIPTION
        data_type: VARCHAR
        sample_values:
          - Non-TCS food that has been served to the public being re-served. (Does not apply to wrapped foods where the wrapper seal has not been broken or opened).
