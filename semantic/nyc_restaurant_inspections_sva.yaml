  - name: 10;1
    question: What is the distribution of inspection grades across different boroughs?
    sql: SELECT r.borough, i.grade, COUNT(*) AS inspection_count FROM fct_inspections AS i JOIN dim_restaurant AS r ON i.dim_restaurant_key = r.dim_restaurant_key WHERE i.grade IN ('A', 'B', 'C') GROUP BY r.borough, i.grade ORDER BY r.borough, i.grade
