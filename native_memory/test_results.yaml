# =============================================================================
# test_results.yaml
# Native Agent Memory: Test Results Log
# =============================================================================
# Track test results across both agents and iteration cycles.
# Version-control this file in Git to diff between runs.
#
# Workflow:
#   1. Copy this file as test_results_run_001.yaml (or use date: _2026_04_07)
#   2. Run each question against both agents
#   3. Fill in actual_tools, actual_response, passed, notes
#   4. Review failures → fix agent spec or procedures
#   5. Copy to test_results_run_002.yaml → re-run failed + regression tests
#   6. Repeat until pass rate meets your threshold
#
# Methodology adapted from:
#   Jia, T. (2025) — Optimize Snowflake Intelligence Cortex Agent Setup
#   Izmit, S. (2025) — Agent Instruction Best Practices for Snowflake Intelligence
# =============================================================================

